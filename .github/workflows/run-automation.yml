name: WorldPosta Link & Button Check

on:
  schedule:
    - cron: "0 6 * * 1"   # Every Monday 06:00 UTC

  workflow_dispatch:
    inputs:
      fail_on_issues:
        description: "Fail if issues found? (true/false)"
        required: false
        default: "true"

  repository_dispatch:
    types: [run-link-check]   # n8n triggers with: { "event_type": "run-link-check" }

jobs:
  link-check:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Google Chrome
        run: |
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list
          sudo apt-get update -q
          sudo apt-get install -y google-chrome-stable

      - name: Run Link Checker
        id: link_check
        run: |
          FAIL="${{ github.event.inputs.fail_on_issues || 'true' }}"

          if [ "$FAIL" = "true" ]; then
            python worldposta_automation_complete.py --headless
          else
            python worldposta_automation_complete.py --headless --no-fail
          fi

      - name: Upload Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: link-check-report-${{ github.run_number }}
          path: |
            link_check_report.xlsx
            link_check_results.json
            link_check_screenshots/
          retention-days: 30

      - name: Print JSON to logs
        if: always()
        run: |
          echo "===== BEGIN_LINK_CHECK_JSON ====="
          cat link_check_results.json || echo "No results file"
          echo "===== END_LINK_CHECK_JSON ====="

      # Uncomment to push results back to n8n:
      # - name: Notify n8n
      #   if: always()
      #   run: |
      #     curl -s -X POST "${{ secrets.N8N_WEBHOOK_URL }}" \
      #       -H "Content-Type: application/json" \
      #       -d "{
      #             \"run\": ${{ github.run_number }},
      #             \"status\": \"${{ steps.link_check.outcome }}\",
      #             \"report_url\": \"https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\"
      #           }"